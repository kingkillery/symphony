app = "symphony-pm"
primary_region = "den"

[build]
  dockerfile = "Dockerfile"

[env]
  SYMPHONY_PORT = "4000"
  SYMPHONY_LOGS_ROOT = "/data/log"
  SYMPHONY_WORKSPACES_ROOT = "/data/workspaces"
  SYMPHONY_WORKFLOW_FILE = "/opt/symphony/runtime/WORKFLOW.md"
  SYMPHONY_CODEX_HOME = "/data/codex-home"
  SYMPHONY_HOST_CODEX_DIR = "/opt/symphony/host-codex"
  SOURCE_REPO_URL = "https://github.com/kingkillery/symphony"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/"
    timeout = "10s"

[[mounts]]
  source = "symphony_data"
  destination = "/data"
